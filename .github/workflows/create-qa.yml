name: Create QA Branch

on:
  workflow_dispatch:
    inputs:
      dev_branch:
        description: "Developer branch name (e.g., dev/feature-login)"
        required: true
        type: string
        pattern: "^dev/[a-zA-Z0-9._-]+$"

jobs:
  create-qa-branch:
    name: Create QA Branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # important: fetch full history

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate dev branch exists
        run: |
          DEV_BRANCH="${{ github.event.inputs.dev_branch }}"
          if ! git ls-remote --exit-code origin $DEV_BRANCH; then
            echo "Error: Developer branch $DEV_BRANCH does not exist on origin."
            exit 1
          fi

      - name: Validate QA branch does not already exist
        run: |
          DEV_BRANCH="${{ github.event.inputs.dev_branch }}"
          QA_BRANCH="${DEV_BRANCH/dev/qa}"
          if git ls-remote --exit-code origin $QA_BRANCH; then
            echo "Error: QA branch $QA_BRANCH already exists on origin."
            exit 1
          fi

      - name: Create QA branch
        run: |
          DEV_BRANCH="${{ github.event.inputs.dev_branch }}"
          QA_BRANCH="${DEV_BRANCH/dev/qa}"

          # Make sure we have the latest commits from origin
          git fetch origin $DEV_BRANCH

          # Checkout the latest commit of the dev branch
          git checkout origin/$DEV_BRANCH

          # Create QA branch at that commit
          git switch -c $QA_BRANCH

          # Push QA branch to origin
          git push origin $QA_BRANCH
