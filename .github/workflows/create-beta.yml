name: Create Beta Release PR

on:
  workflow_dispatch:
    inputs:
      qa_branch:
        description: "QA branch (qa/*)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote-to-beta:
    uses: ./.github/workflows/_promotion-engine.yml
    with:
      source_branch: ${{ github.event.inputs.qa_branch }}
      target_type: beta
      use_github_app: true
    secrets: inherit
