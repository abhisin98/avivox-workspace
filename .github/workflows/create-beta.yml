name: Create Beta Release PR

env:
  # Environment Variables:
  # - Used to configure settings such as database connections and API keys.
  # - It's best to store sensitive values in GitHub Secrets for security.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:
    inputs:
      qa_branch:
        description: "QA branch name (e.g. qa/feature-login)"
        required: true
        type: string
        # pattern: "^qa/[a-zA-Z0-9._-]+$"

jobs:
  create-beta-pr:
    name: Create Beta PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate QA branch exists
        run: |
          QA_BRANCH="${{ github.event.inputs.qa_branch }}"
          if ! git ls-remote --exit-code origin $QA_BRANCH; then
            echo "❌ Error: Branch $QA_BRANCH does not exist on origin."
            exit 1
          fi

      - name: Validate PR does not already exist
        run: |
          QA_BRANCH="${{ github.event.inputs.qa_branch }}"
          EXISTING=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$QA_BRANCH" \
            --state open \
            --json number \
            --jq '.[].number')

          if [ -n "$EXISTING" ]; then
            echo "❌ Error: A PR from $QA_BRANCH to main already exists (#$EXISTING)."
            exit 1
          fi

      - name: Create Pull Request into main
        run: |
          QA_BRANCH="${{ github.event.inputs.qa_branch }}"
          gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "$QA_BRANCH" \
            --title "Beta Release: $QA_BRANCH" \
            --label beta-release \
            --body "### 📦 Beta Release Promotion

            This pull request was **auto-generated** to promote the QA branch:
            
            - **Source Branch:** $QA_BRANCH  
            - **Target Branch:** \`main\`
            
            Once merged, this PR will trigger the **Beta → Production** workflows, ensuring that tested features are safely promoted to the mainline.
            
            ---
            
            ⚠️ Please review carefully before merging to maintain release integrity."
