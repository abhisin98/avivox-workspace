name: Create Beta Release PR

env:
  # Environment Variables:
  # - Used to configure settings such as database connections and API keys.
  # - It's best to store sensitive values in GitHub Secrets for security.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_dispatch:
    inputs:
      qa_branch:
        description: "QA branch name (e.g. qa/feature-login)"
        required: true
        type: string
        pattern: "^qa/[a-zA-Z0-9._-]+$"

jobs:
  create-beta-pr:
    name: Create Beta PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate QA branch exists
        run: |
          QA_BRANCH="${{ github.event.inputs.qa_branch }}"
          if ! git ls-remote --exit-code origin $QA_BRANCH; then
            echo "Error: Branch $QA_BRANCH does not exist on origin."
            exit 1
          fi

      - name: Validate PR does not already exist
        run: |
          QA_BRANCH="${{ github.event.inputs.qa_branch }}"
          # Query GitHub API for open PRs with this branch as head
          EXISTING=$(gh pr list --base main --head "$QA_BRANCH" --state open --json number --jq '.[].number')
          if [ -n "$EXISTING" ]; then
            echo "Error: A PR from $QA_BRANCH to main already exists (#$EXISTING)."
            exit 1
          fi

      - name: Checkout QA branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.qa_branch }}
          fetch-depth: 0

      - name: Create Pull Request into main
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.GITHUB_TOKEN }}
          base: main
          branch: ${{ github.event.inputs.qa_branch }}
          title: "Beta Release: ${{ github.event.inputs.qa_branch }}"
          body: |
            This PR was auto-generated to promote **${{ github.event.inputs.qa_branch }}** into `main`.
            Once merged, it will trigger the Beta → Production workflows.
          labels: beta-release
