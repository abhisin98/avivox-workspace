name: Beta Cleanup

env:
  # Environment Variables:
  # - Used to configure settings such as database connections and API keys.
  # - It's best to store sensitive values in GitHub Secrets for security.
  RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }} # get this in account settings "https://railway.com/account/tokens" (make sure this is NOT a project token), and scope it to your account (not a workspace)
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }} # project ID
  RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }} # railway environment to duplicate from
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }} # service ID to inject database variable into
  # RAILWAY_WORKSPACE_ID: ${{ secrets.RAILWAY_WORKSPACE_ID }} # if you are linking to a project in a workspace, uncomment this
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  cleanup-web:
    name: Cleanup Web (Beta)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Extract PR metadata And Create Pr Environment Name
        id: pr_meta
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          beta_environment="beta-${PR_NUMBER}"
          echo "environment_name=${beta_environment}" >> $GITHUB_OUTPUT

      - id: clean-up
        name: Cleanup PR Environment (Staging)
        uses: ./.github/actions/railway-deploy
        with:
          api-token: ${{ env.RAILWAY_API_TOKEN }}
          project-id: ${{ env.RAILWAY_PROJECT_ID }}
          environment-id: ${{ env.RAILWAY_ENVIRONMENT_ID }}
          service-id: ${{ env.RAILWAY_SERVICE_ID }}
          pr-environment-name: ${{ steps.pr_meta.outputs.environment_name }}
          cleanup-pr-environment: "true"

      - name: Remove deployment comment
        if: ${{ steps.clean-up.outputs.cleanup == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- comment -->'; // same marker used in deployment workflow
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existingComment = comments.find(c => c.body.includes(marker));

            if (existingComment) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: existingComment.id });
              await github.rest.issues.createComment({
                issue_number,
                owner,
                repo,
                body: `🧹 **Preview environment \`${{ steps.pr_meta.outputs.environment }}\` deleted for PR #${context.issue.number}. Deployment comment removed.**`
              });
              core.info(`Deleted deployment comment ID: ${existingComment.id}`);
            } else {
              core.info('No deployment comment found to delete');
            }

